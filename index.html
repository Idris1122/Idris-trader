<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IDRIS TRADER PRO</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
}
h1{color:gold;}

/* CARD */
.card{
  background:#161b22;
  margin:15px;
  padding:20px;
  border-radius:15px;
}

/* BUTTON */
.btn{
  padding:12px 20px;
  background:gold;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* PRICE */
.price{
  font-size:30px;
  color:#00ff9c;
}

/* LOGIN */
.login{
  text-align:center;
  margin:20px;
}
input{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}
</style>
</head>

<body>

<header>
<h1>IDRIS TRADER PRO</h1>
<p>Live Signals + Smart Trading Tools</p>
</header>

<!-- LIVE PRICE -->
<div class="card">
<h3>LIVE GOLD PRICE</h3>
<p class="price" id="gold">Loading...</p>
</div>

<!-- SIGNAL -->
<div class="card">
<h3>LIVE SIGNAL</h3>
<p>BUY LIMIT</p>
<p>Entry: 2345.50</p>
<p>TP: 2360 | SL: 2335</p>
<button class="btn" onclick="alertSignal()">Get Alert</button>
</div>

<!-- TRADINGVIEW CHART -->
<div class="card">
<h3>Live Chart</h3>

<!-- TradingView Widget -->
<div class="tradingview-widget-container">
  <div id="tradingview_chart"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 300,
  "symbol": "OANDA:XAUUSD",
  "interval": "5",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "container_id": "tradingview_chart"
});
</script>

</div>

<!-- LOGIN -->
<div class="card login">
<h3>VIP Login</h3>
<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>
<button class="btn" onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<script>

// 🔥 FAKE LIVE GOLD PRICE (auto update)
function updateGold(){
  let price = (2300 + Math.random()*100).toFixed(2);
  document.getElementById("gold").innerHTML = price;
}
setInterval(updateGold,2000);
updateGold();

// 🔔 SIGNAL ALERT
function alertSignal(){
  alert("🔥 NEW SIGNAL: BUY XAUUSD NOW!");
}

// 🔐 LOGIN SYSTEM
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u=="idris" && p=="1234"){
    document.getElementById("loginMsg").innerHTML="✅ Welcome VIP!";
  }else{
    document.getElementById("loginMsg").innerHTML="❌ Wrong login";
  }
}

</script>

</body>
</html>
